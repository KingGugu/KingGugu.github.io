---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
     <style>
    .projects-box {
      /* background-color: green; */
      height: 180px;
      position: relative;
      overflow: hidden;
      transition: all ease-in .1s;

    }
    .projects-show {
      padding: 0;
      margin: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      text-align: center;
      height: 15px;
      line-height: 20px;
      width: 100%;
      font-size: 12px;
      color: #0067c8;
      cursor: pointer;
      background: linear-gradient(to bottom, transparent, #fff, #fff);
    }
    .projects-show-text {
      position: relative;
      top: 5px;
    }
  </style>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>
    {% include scripts.html %}

          <script>
          function setSiteLanguage(lang) {
            document.documentElement.lang = lang === 'zh' ? 'zh' : 'en';
            try {
              localStorage.setItem('site-lang', document.documentElement.lang);
            } catch (e) {}
          }

          let isSwitchingLanguage = false;

          document.querySelectorAll('.projects-container').forEach(function(container) {
            const box = container.querySelector('.projects-box');
            const trigger = container.querySelector('.projects-show');
            const text = container.querySelector('.projects-show-text');
            const lang = container.dataset.lang === 'zh' ? 'zh' : 'en';
            const labels = lang === 'zh'
              ? { more: '更多', less: '收起' }
              : { more: 'More', less: 'Less' };
            let expanded = false;

            if (!box || !trigger || !text) {
              return;
            }

            function render() {
              box.style.height = expanded ? 'auto' : '180px';
              box.style.paddingBottom = expanded ? '20px' : '0px';
              text.innerHTML = expanded ? labels.less : labels.more;
            }

            render();
            trigger.onclick = function() {
              expanded = !expanded;
              render();
            };
          });

          const langToggle = document.querySelector('#lang-toggle');
          if (langToggle) {
            langToggle.onclick = function(event) {
              event.preventDefault();
              if (isSwitchingLanguage) {
                return;
              }

              isSwitchingLanguage = true;
              document.body.classList.add('lang-switching');

              window.setTimeout(function() {
                setSiteLanguage(document.documentElement.lang === 'zh' ? 'en' : 'zh');

                window.requestAnimationFrame(function() {
                  document.body.classList.remove('lang-switching');
                  isSwitchingLanguage = false;
                });
              }, 140);
            };
          }
        </script>
  </body>

</html>
