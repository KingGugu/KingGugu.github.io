---
layout: compress
---

<!doctype html>
<html lang="{{ page.lang | default: 'en' }}" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
     <style>
    .projects-box {
      /* background-color: green; */
      height: 180px;
      position: relative;
      overflow: hidden;
      transition: all ease-in .1s;

    }
    .projects-show {
      padding: 0;
      margin: 0;
      position: absolute;
      bottom: 0;
      left: 0;
      text-align: center;
      height: 15px;
      line-height: 20px;
      width: 100%;
      font-size: 12px;
      color: #0067c8;
      cursor: pointer;
      background: linear-gradient(to bottom, transparent, #fff, #fff);
    }
    .projects-show-text {
      position: relative;
      top: 5px;
    }
  </style>
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
        </div>
      </article>
    </div>
    {% include scripts.html %}

          <script>
          const currentLang = document.documentElement.lang || 'en';
          const moreLabel = currentLang === 'zh' ? '更多' : 'More';
          const lessLabel = currentLang === 'zh' ? '收起' : 'Less';
          const projectsShow = document.querySelector('#projects-show');
          const projectsBox = document.querySelector('#projects-box');
          const projectsShowText = document.querySelector('#projects-show-text');
          let show = false;

          if (projectsShow && projectsBox && projectsShowText) {
            projectsShowText.innerHTML = moreLabel;
            projectsShow.onclick = function() {
              if (!show) {
                projectsBox.style.height = 'auto';
                projectsBox.style.paddingBottom = '20px';
                projectsShowText.innerHTML = lessLabel;
                show = true;
              } else {
                show = false;
                projectsBox.style.height = '180px';
                projectsBox.style.paddingBottom = '0px';
                projectsShowText.innerHTML = moreLabel;
              }
            };
          }
        </script>
  </body>

</html>
